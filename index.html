<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoane & Marie-Aude | Invitation Mariage</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Montserrat:wght@300;400;500;600;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* VARIABLES CSS - TROPICAL SUNSET */
    :root {
      --primary-warm: #ff8a5c;
      --primary-dark: #ff6f3c;
      --secondary-pink: #f7b6c8;
      --gold-accent: #d4af37;
      --light-peach: #fff7f2;
      --dark-bg: #1a1a1a;
      --text-dark: #2d2d2d;
      --text-light: #666;
      --green-tropical: #6fa876;
      --orange-sunset: #ff9a5c;
      --border-radius: 15px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 20px 50px rgba(255, 138, 92, 0.15);
      --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(180deg, #fff7f2 0%, #fff0e6 100%);
      overflow-x: hidden;
      color: var(--text-dark);
      line-height: 1.8;
      min-height: 100vh;
    }

    /* (styles omitted for brevity — unchanged) */
  </style>
</head>

<body>
  <!-- ENVELOPPE -->
  <div id="envelope">
    <h1>💌 Yoane & Marie-Aude<br>vous invitent à leur union</h1>
    <button onclick="openSite()">Ouvrir l'invitation</button>
  </div>

  <!-- MUSIC CONTROLS (autoplay attempt + fallback unmute) -->
  <div class="music-controls" style="position:fixed; bottom:20px; left:20px; z-index:1000;">
    <button id="music-toggle" aria-pressed="false">⏸️ Pause</button>
    <button id="unmute" style="display:none">🔊 Activer le son</button>
  </div>

  <audio id="bg-music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b3c8.mp3" loop preload="auto" playsinline></audio>

  <header>
    <h1>Yoane & Marie-Aude</h1>
    <p class="subtitle">Cantique des cantiques 2:16</p>
    <p class="quote">« Mon bien-aimé est à moi, et je suis à lui »</p>
  </header>

  <!-- content omitted for brevity (unchanged sections) -->

  <section>
    <h2>💌 RSVP</h2>
    <form id="rsvpForm">
      <label for="nom">Votre nom complet *</label>
      <input type="text" id="nom" name="nom" placeholder="Ex: Jean Dupont" required>

      <label for="tel">Votre téléphone *</label>
      <input type="tel" id="tel" name="tel" placeholder="Ex: +225 07 XX XX XX XX" required>

      <label for="accompagne">Viendrez-vous accompagné(e) ? *</label>
      <select id="accompagne" name="accompagne" required>
        <option value="">-- Sélectionnez --</option>
        <option value="Oui">Oui</option>
        <option value="Non">Non</option>
      </select>

      <label for="nom_accompagnateur">Nom de votre accompagnateur (optionnel)</label>
      <input type="text" id="nom_accompagnateur" name="nom_accompagnateur" placeholder="Si applicable">

      <button type="submit">✓ Confirmer ma présence</button>
    </form>
  </section>

  <footer>
    <p>
      Votre présence est notre plus beau cadeau.<br><br>
      <span style="font-family: 'Playfair Display', serif; font-size: 1.3em;">Yoane & Marie-Aude</span> ❤️
    </p>
  </footer>

  <script>
    // ENVELOPPE
    function openSite() {
      const envelope = document.getElementById("envelope");
      envelope.style.animation = "fadeInEnvelope 0.6s ease reverse";
      setTimeout(() => {
        envelope.style.display = "none";
      }, 600);
    }

    // COUNTDOWN (omitted)

    // MUSIC PLAYER handled by assets/js/music-player.js

    // RSVP -> GOOGLE SHEETS
    document.getElementById("rsvpForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const formData = new FormData(this);

      // Web App URL (no token)
      const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxGR4mRViJbZw6eZKTq6X4tdsDAHwiQwmjJWTJp3dKX0QtMjL54hfKdCV20bk3pWUI/exec";

      const payload = {
        nom: formData.get("nom"),
        tel: formData.get("tel"),
        accompagne: formData.get("accompagne"),
        nom_accompagnateur: formData.get("nom_accompagnateur"),
        timestamp: new Date().toISOString()
      };

      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(response => {
          if (!response.ok) throw new Error('Network response was not ok');
          alert('✓ Confirmation envoyée avec amour ! 💕');
          this.reset();
        })
        .catch(error => {
          console.error('Erreur:', error);
          alert("⚠️ Erreur lors de l'envoi, veuillez réessayer");
        });
    });
  </script>

  <script src="assets/js/music-player.js"></script>
  <link rel="stylesheet" href="assets/css/music-player.css">
</body>
</html>
